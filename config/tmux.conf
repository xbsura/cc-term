# ============================================================
# cc-term tmux config — isolated under ~/.cc-term
# ============================================================

# =====================
# Shell: 自动加载 bash_profile
# =====================
set -g default-command "exec bash --rcfile ~/.cc-term/config/bash_profile"

# =====================
# 前缀键改为 Ctrl+A
# =====================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =====================
# 分屏快捷键
# =====================
unbind '"'
unbind %
bind -n F5 split-window -v    # F5 横切（上下）
bind -n F6 split-window -h    # F6 纵切（左右）

# =====================
# F11 F12 切换窗口（状态栏 tab）
# =====================
bind -n F11 previous-window    # F11 上一个窗口
bind -n F12 next-window        # F12 下一个窗口

# =====================
# Ctrl+A + 方向键 切换 pane
# =====================
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# =====================
# pane 大小调节 (Option+方向键，无需前缀)
# =====================
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5

# =====================
# 鼠标支持
# =====================
set -g mouse on
set -g word-separators " @()[]{}:,.'\"/"

# =====================
# 复制模式（vi 风格）
# =====================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# =====================
# 状态栏样式（清淡蓝色主题）
# =====================
set -g status on
set -g status-interval 1
set -g status-position bottom

# 状态栏整体颜色
set -g status-style "bg=#34495e,fg=#d5e1ec"

# 左侧：session 名（绿色背景，与窗口 tab 区分）
set -g status-left-length 40
set -g status-left "#[bg=#27ae60,fg=#ffffff,bold] #S #[bg=#34495e,fg=#27ae60] "

# 右侧：时间日期
set -g status-right-length 80
set -g status-right "#[fg=#5b9bd5]#[bg=#5b9bd5,fg=#1a2532] %H:%M #[bg=#2c3e50,fg=#aab7c4] %Y-%m-%d "

# 当前窗口 tab 样式
setw -g window-status-current-style "bg=#5b9bd5,fg=#1a2532,bold"
setw -g window-status-current-format " #I:#W "

# 其他窗口 tab 样式
setw -g window-status-style "bg=#34495e,fg=#8ea8c3"
setw -g window-status-format " #I:#W "

# 消息样式
set -g message-style "bg=#5b9bd5,fg=#1a2532"

# pane 边框颜色
set -g pane-border-style "fg=#3d566e"
set -g pane-active-border-style "fg=#5b9bd5"

# =====================
# 终端与颜色
# =====================
set -g default-terminal "xterm-256color"
set -as terminal-overrides ',xterm-256color:Tc'

# =====================
# 其他优化
# =====================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0              # 去掉 ESC 延迟（vim 友好）
set -g history-limit 50000         # 滚动历史 5 万行
set -g display-time 2000           # 消息显示 2 秒
set -g focus-events on             # 支持 focus 事件
setw -g aggressive-resize on       # 多客户端自适应窗口大小

# 快捷重载配置（指向隔离路径）
bind r source-file ~/.cc-term/config/tmux.conf \; display-message "Config reloaded"

# =====================
# 扩展按键支持
# =====================
set -g extended-keys on
set -as terminal-features 'tmux*:extkeys'
bind-key -n S-Enter send-keys 'Escape' '[13;2u'
bind-key -n Home send-keys 'Escape' '[H'
bind-key -n End send-keys 'Escape' '[F'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# =====================
# 插件：会话自动保存与恢复
# =====================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.cc-term/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect 配置
set -g @resurrect-capture-pane-contents 'on'        # 保存 pane 内容
set -g @resurrect-processes '~claude ~vim ~nvim ~ssh' # 恢复这些进程（~ 表示保留原始参数）

# continuum 配置
set -g @continuum-save-interval '10'                 # 每 10 分钟自动保存
set -g @continuum-restore 'on'                       # tmux 启动时自动恢复上次会话

# TPM 初始化（使用隔离路径，必须放在最后一行）
run '~/.cc-term/tmux/plugins/tpm/tpm'
