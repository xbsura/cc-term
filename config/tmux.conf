# ============================================================
# cc-term tmux config — isolated under ~/.cc-term
# ============================================================

# =====================
# Shell: auto-load bash_profile
# =====================
set -g default-command "exec bash --rcfile ~/.cc-term/config/bash_profile"

# =====================
# Allow iTerm2 escape sequences (imgcat, etc.)
# =====================
set -g allow-passthrough on

# =====================
# Prefix key: Ctrl+A
# =====================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =====================
# Split pane shortcuts
# =====================
unbind '"'
unbind %
bind -n F5 split-window -v    # F5 horizontal split (top/bottom)
bind -n F6 split-window -h    # F6 vertical split (left/right)

# =====================
# F11/F12 switch windows (status bar tabs)
# =====================
bind -n F11 previous-window    # F11 previous window
bind -n F12 next-window        # F12 next window

# =====================
# Ctrl+A + arrow keys to switch panes
# =====================
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# =====================
# Pane resize (Option+arrow keys, no prefix needed)
# =====================
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5

# =====================
# Mouse support
# =====================
set -g mouse off
set -g word-separators " @()[]{}:,.'\"/"

# =====================
# Copy mode (vi style)
# =====================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# =====================
# Status bar style (light blue theme)
# =====================
set -g status on
set -g status-interval 1
set -g status-position bottom

# Status bar colors
set -g status-style "bg=#34495e,fg=#d5e1ec"

# Left: session name (green background, distinct from window tabs)
set -g status-left-length 40
set -g status-left "#[bg=#27ae60,fg=#ffffff,bold] #S #[bg=#34495e,fg=#27ae60] "

# Right: time and date
set -g status-right-length 80
set -g status-right "#[fg=#5b9bd5]#[bg=#5b9bd5,fg=#1a2532] %H:%M #[bg=#2c3e50,fg=#aab7c4] %Y-%m-%d #(~/.cc-term/bin/cc-remote-status.sh '#{session_name}')"

# Current window tab style
setw -g window-status-current-style "bg=#5b9bd5,fg=#1a2532,bold"
setw -g window-status-current-format " #I:#W "

# Other window tab style
setw -g window-status-style "bg=#34495e,fg=#8ea8c3"
setw -g window-status-format " #I:#W "

# Message style
set -g message-style "bg=#5b9bd5,fg=#1a2532"

# Pane border colors
set -g pane-border-style "fg=#3d566e"
set -g pane-active-border-style "fg=#5b9bd5"

# =====================
# Terminal and colors
# =====================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:Tc'

# =====================
# Other optimizations
# =====================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10             # 10ms: enough to group ESC sequences, low enough to feel instant
set -g history-limit 50000         # 50k lines of scrollback history
set -g display-time 2000           # Display messages for 2 seconds
set -g focus-events on             # Enable focus events
setw -g aggressive-resize off       # Off: avoid spurious SIGWINCH causing TUI full-redraws

# Reload config shortcut (points to isolated path)
bind r source-file ~/.cc-term/config/tmux.conf \; display-message "Config reloaded"

# =====================
# Extended key support
# =====================
set -g extended-keys on
set -as terminal-features 'tmux*:extkeys'
bind-key -n S-Enter send-keys 'Escape' '[13;2u'
bind-key -n Home send-keys 'Escape' '[H'
bind-key -n End send-keys 'Escape' '[F'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# =====================
# Plugins: session auto-save and restore
# =====================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.cc-term/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect config
set -g @resurrect-capture-pane-contents 'on'        # Save pane contents
set -g @resurrect-processes '~claude ~vim ~nvim ~ssh' # Restore these processes (~ preserves original args)

# Continuum config
set -g @continuum-save-interval '10'                 # Auto-save every 10 minutes
set -g @continuum-restore 'on'                       # Auto-restore last session on tmux start

# TPM init (uses isolated path, must be the last line)
run '~/.cc-term/tmux/plugins/tpm/tpm'
